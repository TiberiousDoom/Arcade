<!DOCTYPE html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>Angle Iron</title>
<link rel="manifest" href="../../manifest.webmanifest">
<meta name="theme-color" content="#0b1418">
<link rel="icon" href="../../shared/icons/favicon-32.png" sizes="32x32" type="image/png">
<link rel="apple-touch-icon" href="../../shared/icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Arcade">
<link rel="stylesheet" href="../../shared/theme.css">
<script type="module" src="../../shared/pwa.js"></script>
<style>
  /* Angle Iron keeps the default brass accent, on an 800x600 board. */
  :root{ --board-max:800px }
</style>

<div id="shell">
  <header>
    <div class="titles">
      <a class="back" href="../../index.html">&larr; Arcade</a>
      <h1>Angle <span>Iron</span></h1>
    </div>
    <div class="meta">
      <div>Level <b id="uiLevel">1</b></div>
      <div>Score <b id="uiScore">0</b></div>
      <div>Balls <b id="uiLives">3</b></div>
    </div>
  </header>

  <div id="stage">
    <canvas id="cv" width="800" height="600"></canvas>
    <div id="banner">
      <h2>Angle Iron</h2>
      <p id="hint">Slide to steer, tap to serve.</p>
      <button id="go">Begin</button>
    </div>
  </div>

  <footer>
    <span>Hit the edges of the paddle to steer</span>
    <span>Back rows take more hits</span>
    <span>Clear the board to advance</span>
  </footer>
</div>

<script type="module">
import * as E from './engine.js';
import { makeFit } from '../../shared/fit.js';
import { makeFx } from '../../shared/fx.js';
import { makeHelp } from '../../shared/help.js';

const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
const TAU = E.TAU;
const reduce = matchMedia('(prefers-reduced-motion:reduce)').matches;
const $ = id => document.getElementById(id);

const gfx = makeFx({ reduce });

/* purely cosmetic — the engine never sees these */
const fx = {
  brick(x, y, row) {
    gfx.burst(x, y, BRICK_COL[Math.min(row, BRICK_COL.length - 1)] || '#e6e9e2');
  },
  bounce() {},
  lose() { gfx.hit(.5); },
};

/* Portrait phones get the narrower, taller board with a thumb rest below the
   floor line; landscape gets the wide one and rests thumbs in the side
   gutters instead. Re-picked whenever the phone turns — see applyLayout. */
const pickLayout = () =>
  matchMedia('(max-aspect-ratio: 4/5)').matches ? E.LAYOUT_TALL : E.LAYOUT;

const world = E.createWorld({ fx, layout: pickLayout() });

let W = world.L.W, H = world.L.H;
const board = { w: W, h: H };          // makeFit re-reads this on every fit

function adoptLayout() {
  W = world.L.W; H = world.L.H;
  board.w = W; board.h = H;
  cv.width = W; cv.height = H;
  document.documentElement.style.setProperty('--board-max', W + 'px');
}
adoptLayout();

/* brick colour by grid row: back rows (tougher) skew brass, front rows green */
const BRICK_COL = ['#c9a227', '#c9a227', '#3fae8f', '#3fae8f', '#5fc9a4', '#5fc9a4', '#8dbf4a'];
const brickFace = (b) => BRICK_COL[Math.min(b.row, BRICK_COL.length - 1)] || '#3fae8f';

/* ---------- input ---------- */
let keys = {};

function stageX(e) {
  const r = cv.getBoundingClientRect();
  return (e.clientX - r.left) * (W / r.width);
}

/* Two ways to steer, picked by where the finger lands.
   On the board: the paddle jumps to your finger — direct and precise.
   In the side gutters (landscape, where the board can't fill the width): a
   relative drag, so a thumb parked off to the side still steers without any
   part of your hand crossing the play area. */
let drag = null;
const GUTTER_GAIN = 1.6;      // gutter drags are amplified; a thumb travels less

function onDown(e) {
  e.preventDefault();
  const r = cv.getBoundingClientRect();
  const onBoard = e.clientX >= r.left && e.clientX <= r.right;
  if (onBoard) {
    drag = { mode: 'absolute' };
    E.setPaddle(world, stageX(e));
  } else {
    drag = { mode: 'relative', fromX: e.clientX, fromPaddle: world.paddle.x, scale: W / r.width };
  }
  if (world.running) E.launch(world);        // the press itself serves the ball
}

function onMove(e) {
  if (!drag && e.pointerType !== 'mouse') return;
  if (drag && drag.mode === 'relative') {
    E.setPaddle(world, drag.fromPaddle + (e.clientX - drag.fromX) * drag.scale * GUTTER_GAIN);
    return;
  }
  if (e.pointerType === 'mouse' || e.buttons) E.setPaddle(world, stageX(e));
}

const surface = $('stage');
surface.addEventListener('pointerdown', e => {
  // let the ? button and the banner buttons work normally
  if (e.target.closest('button')) return;
  // capture can legitimately fail (pointer already gone); steering still works
  try { surface.setPointerCapture(e.pointerId); } catch {}
  onDown(e);
});
surface.addEventListener('pointermove', onMove);
addEventListener('pointerup', () => { drag = null; });
addEventListener('pointercancel', () => { drag = null; });
for (const ev of ['selectstart', 'contextmenu', 'dragstart']) {
  surface.addEventListener(ev, e => e.preventDefault());
}

addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') { e.preventDefault(); if (world.running) E.launch(world); }
});
addEventListener('keyup', e => { keys[e.code] = false; });

const fitStage = makeFit({ canvas: cv, stage: $('stage'), board });

/* Rotating the phone moves the game onto the other board. Nothing is lost:
   both layouts share a brick grid, so damage carries across index-for-index,
   along with level, score and lives. Only the ball is re-racked. */
function applyLayout() {
  const L2 = pickLayout();
  if (L2 === world.L) return;
  E.relayout(world, L2);
  adoptLayout();
  fitStage();
  sync();
}
addEventListener('resize', applyLayout);
addEventListener('orientationchange', () => setTimeout(applyLayout, 200));

makeHelp({
  stage: $('stage'),
  title: 'Angle Iron',
  rows: [
    ['Steer', 'Slide your finger anywhere along the board. In landscape you can rest a thumb in the dim strip either side and drag there instead.'],
    ['Serve', 'Tap to send the ball off the paddle.'],
    ['Aim', 'Where the ball lands across the paddle sets the angle it leaves. The middle sends it straight up; the further out it hits, the wider it goes.'],
    ['Keyboard', 'Arrow keys to move, Space to serve.'],
  ],
  notes: [
    'The back rows are armoured and take up to three hits.',
    'Clear the whole board to advance a level and take a bonus.',
    'Turn the phone at any time — the board changes shape and your progress comes with it.',
  ],
});

/* ---------- banner ---------- */
function showBanner(h, p, btn) {
  $('banner').classList.remove('hide');
  $('banner').querySelector('h2').textContent = h;
  $('hint').innerHTML = p;
  const b = $('go'); b.textContent = btn; b.style.display = '';
}
function hideBanner() { $('banner').classList.add('hide'); }

/* One handler for every banner state — a game over restarts, a cleared level
   advances, and the opening banner just starts. Rewiring onclick per state
   left the original listener attached too, so both fired on the same click. */
$('go').addEventListener('click', () => {
  if (world.over) E.resetGame(world);
  else if (world.levelClear) E.nextLevel(world);
  world.running = true;
  gfx.clear();               // don't let a death flash bleed into the next run
  hideBanner();
});

/* ---------- loop ---------- */
let last = performance.now();
function frame(now) {
  const dt = Math.min((now - last) / 1000, 1 / 30);
  last = now;

  if (world.running && !world.over) {
    let kb = 0;
    if (keys.ArrowLeft) kb -= 1;
    if (keys.ArrowRight) kb += 1;
    if (kb) E.nudgePaddle(world, kb * 620 * dt);

    E.step(world, dt);

    if (world.over) showBanner('Game Over', `Score <b style="color:var(--brass)">${world.score}</b> · reached level ${world.level}`, 'Play again');
    else if (world.levelClear) {
      world.running = false;
      showBanner('Level Cleared', `Level ${world.level} down. Score <b style="color:var(--brass)">${world.score}</b>.`, 'Next level');
    }
    sync();
  }

  // cosmetic particles + hit flash decay regardless of pause
  gfx.step(dt, 1.5);

  draw();
  requestAnimationFrame(frame);
}

function sync() {
  $('uiLevel').textContent = world.level;
  $('uiScore').textContent = world.score;
  $('uiLives').textContent = world.lives;
}

/* ---------- draw ---------- */
function draw() {
  const L = world.L;
  ctx.clearRect(0, 0, W, H);

  // playfield border — down to the floor, not the canvas bottom, so on a
  // portrait board the thumb band reads as being outside the court
  ctx.strokeStyle = 'rgba(99,121,127,.35)';
  ctx.lineWidth = 2;
  ctx.strokeRect(L.WALL, L.WALL, W - 2 * L.WALL, L.FLOOR - L.WALL);

  // the open floor, marked so the losing edge is visible
  ctx.strokeStyle = 'rgba(224,80,60,.3)';
  ctx.lineWidth = 1;
  ctx.setLineDash([6, 8]);
  ctx.beginPath();
  ctx.moveTo(L.WALL, L.FLOOR - 1.5);
  ctx.lineTo(W - L.WALL, L.FLOOR - 1.5);
  ctx.stroke();
  ctx.setLineDash([]);

  // a lost-ball flash tints the floor red
  if (gfx.flash > 0) {
    ctx.fillStyle = `rgba(224,80,60,${gfx.flash * 0.4})`;
    ctx.fillRect(0, L.FLOOR - 60, W, 60);
  }

  // bricks
  for (const b of world.bricks) {
    if (!b.alive) continue;
    const col = brickFace(b);
    ctx.fillStyle = col;
    ctx.globalAlpha = b.hp < b.maxhp ? 0.45 + 0.55 * (b.hp / b.maxhp) : 1;
    ctx.fillRect(b.x, b.y, b.w, b.h);
    if (b.flash > 0) {
      ctx.globalAlpha = Math.min(1, b.flash * 6);
      ctx.fillStyle = '#e6e9e2';
      ctx.fillRect(b.x, b.y, b.w, b.h);
    }
    ctx.globalAlpha = 1;
    // a darker inner edge so tiled bricks stay distinct
    ctx.strokeStyle = 'rgba(11,20,24,.5)'; ctx.lineWidth = 1;
    ctx.strokeRect(b.x + .5, b.y + .5, b.w - 1, b.h - 1);
  }

  // paddle
  const p = world.paddle;
  ctx.fillStyle = '#c9a227';
  ctx.fillRect(p.x - p.w / 2, L.PADDLE_Y, p.w, L.PADDLE_H);
  ctx.fillStyle = 'rgba(230,233,226,.25)';
  ctx.fillRect(p.x - p.w / 2, L.PADDLE_Y, p.w, 3);

  gfx.draw(ctx);

  // balls — either the live ones, or the racked ball waiting on the paddle
  ctx.fillStyle = '#e6e9e2';
  if (world.held) {
    const hp = E.heldBallPos(world);
    ball(hp.x, hp.y, L.BALL_R);
  }
  for (const b of world.balls) ball(b.x, b.y, b.r);
}

function ball(x, y, r) {
  ctx.beginPath();
  ctx.arc(x, y, r, 0, TAU);
  ctx.fill();
}

sync();                      // makeFit already performed the first fit
requestAnimationFrame(frame);
</script>
