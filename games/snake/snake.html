<!DOCTYPE html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>Snake</title>
<link rel="stylesheet" href="../../shared/theme.css">
<style>
  /* Snake runs green rather than brass, on an 800x600 board. */
  :root{
    --accent:var(--scale);
    --accent-hot:#5fc9a4;
    --accent-ink:#06201a;
    --board-max:800px;
  }
</style>

<div id="shell">
  <header>
    <h1>Sn<span>ake</span></h1>
    <div class="meta">
      <div>Score <b id="uiScore">0</b></div>
      <div>Length <b id="uiLen">4</b></div>
      <div>Eaten <b id="uiEaten">0</b></div>
    </div>
  </header>

  <div id="stage">
    <canvas id="cv" width="800" height="600"></canvas>
    <div id="banner">
      <h2>Snake</h2>
      <p id="hint">Steer with <kbd>←</kbd><kbd>↑</kbd><kbd>↓</kbd><kbd>→</kbd> or <kbd>WASD</kbd> — on a touch screen, swipe. Every meal makes you longer and the board faster. The gold bonus is worth five meals, but it won't wait.</p>
      <button id="go">Begin</button>
    </div>
  </div>

  <footer>
    <span>You may cross where your tail is leaving</span>
    <span>Two turns can be buffered</span>
    <span>The gold one expires</span>
  </footer>
</div>

<script type="module">
import * as E from './engine.js';
import { makeFit } from '../../shared/fit.js';
import { makeFx } from '../../shared/fx.js';

const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
const $ = id => document.getElementById(id);
const reduce = matchMedia('(prefers-reduced-motion:reduce)').matches;

const gfx = makeFx({ reduce, gravity: 200 });

/* Translate grid coordinates to pixels before handing off to the shared
   particle layer, which works in pixels like every other shell's does. */
const cellBurst = (cx, cy, col, n) =>
  gfx.burst((cx + .5) * L.CELL, (cy + .5) * L.CELL, col, n, 120);

/* cosmetic only — the engine never sees these */
const fx = {
  eat(x, y) { cellBurst(x, y, '#c9a227', 10); },
  bonus(x, y) { cellBurst(x, y, '#e6e9e2', 20); gfx.hit(.5); },
  die() { gfx.hit(.8); },
};

/* Portrait phones get a taller, narrower grid at the same cell size. Chosen
   once at load — rotating mid-run would rebuild the board under the player. */
const portrait = matchMedia('(max-aspect-ratio: 4/5)').matches;
const LAY = portrait ? E.LAYOUT_TALL : E.LAYOUT;

const world = E.createWorld({ fx, layout: LAY, seed: Date.now() & 0x7fffffff });
const L = world.L;
cv.width = L.W; cv.height = L.H;
// keep the CSS shell width in step with whichever board we picked
document.documentElement.style.setProperty('--board-max', L.W + 'px');

/* ---------- input ---------- */
const KEYS = {
  ArrowLeft: [-1, 0], KeyA: [-1, 0],
  ArrowRight: [1, 0], KeyD: [1, 0],
  ArrowUp: [0, -1], KeyW: [0, -1],
  ArrowDown: [0, 1], KeyS: [0, 1],
};

addEventListener('keydown', e => {
  const d = KEYS[e.code];
  if (!d) return;
  e.preventDefault();
  // an arrow key also serves as "start", so the game begins the moment you steer
  if (!world.running && !world.over) start();
  E.turn(world, d[0], d[1]);
});

/* Touch: a swipe picks the dominant axis. Snake is unplayable on a phone
   without this, and a grid game makes the gesture unambiguous. */
let swipe = null;
const SWIPE_MIN = 24;      // px of travel before a flick counts

cv.addEventListener('pointerdown', e => {
  e.preventDefault();
  cv.setPointerCapture(e.pointerId);
  swipe = { x: e.clientX, y: e.clientY };
});
cv.addEventListener('pointerup', e => {
  if (!swipe) return;
  const dx = e.clientX - swipe.x, dy = e.clientY - swipe.y;
  swipe = null;
  if (Math.max(Math.abs(dx), Math.abs(dy)) < SWIPE_MIN) return;
  if (!world.running && !world.over) start();
  if (Math.abs(dx) > Math.abs(dy)) E.turn(world, Math.sign(dx), 0);
  else E.turn(world, 0, Math.sign(dy));
});
cv.addEventListener('pointercancel', () => { swipe = null; });
for (const ev of ['selectstart', 'contextmenu', 'dragstart']) {
  cv.addEventListener(ev, e => e.preventDefault());
}

/* ---------- banner ---------- */
function showBanner(h, p, btn) {
  $('banner').classList.remove('hide');
  $('banner').querySelector('h2').textContent = h;
  $('hint').innerHTML = p;
  $('go').textContent = btn;
}
function start() {
  if (world.over) E.resetGame(world);
  world.running = true;
  gfx.clear();               // don't let the death flash bleed into a fresh run
  $('banner').classList.add('hide');
  sync();
}
$('go').addEventListener('click', start);

const fitStage = makeFit({ canvas: cv, stage: $('stage'), board: { w: L.W, h: L.H } });

/* ---------- loop ---------- */
let last = performance.now();
function frame(now) {
  const dt = Math.min((now - last) / 1000, 1 / 30);
  last = now;

  const wasOver = world.over;
  E.step(world, dt);
  if (world.over && !wasOver) {
    if (world.won) showBanner('Board Cleared', `You filled the grid. Score <b style="color:var(--brass)">${world.score}</b>.`, 'Play again');
    else showBanner('Game Over', `Score <b style="color:var(--brass)">${world.score}</b> · length ${world.snake.length} · ${world.eaten} eaten`, 'Play again');
  }
  if (world.running) sync();

  gfx.step(dt);

  draw();
  requestAnimationFrame(frame);
}

function sync() {
  $('uiScore').textContent = world.score;
  $('uiLen').textContent = world.snake.length;
  $('uiEaten').textContent = world.eaten;
}

/* ---------- draw ---------- */
const C = L.CELL;
const cx = c => c * C, cy = c => c * C;

function draw() {
  ctx.clearRect(0, 0, L.W, L.H);
  drawGrid();

  if (world.food) drawFood(world.food);
  if (world.bonus) drawBonus(world.bonus);
  drawSnake();

  gfx.draw(ctx);

  if (gfx.flash > 0) {
    ctx.fillStyle = `rgba(224,80,60,${gfx.flash * .28})`;
    ctx.fillRect(0, 0, L.W, L.H);
  }
}

function drawGrid() {
  ctx.strokeStyle = 'rgba(35,56,63,.55)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let x = 1; x < L.COLS; x++) { ctx.moveTo(cx(x) + .5, 0); ctx.lineTo(cx(x) + .5, L.H); }
  for (let y = 1; y < L.ROWS; y++) { ctx.moveTo(0, cy(y) + .5); ctx.lineTo(L.W, cy(y) + .5); }
  ctx.stroke();
  ctx.strokeStyle = 'rgba(99,121,127,.4)';
  ctx.lineWidth = 2;
  ctx.strokeRect(1, 1, L.W - 2, L.H - 2);
}

/** Body cells sit on the grid, but the head slides out of the cell it came
 *  from and the tail retracts into the next one, so motion reads as continuous
 *  rather than a row of jumps. Both come from the engine's tick progress, so
 *  the animation can't drift out of sync with the simulation. */
function drawSnake() {
  const s = world.snake, n = s.length;
  const p = world.running && !world.over ? E.tickProgress(world) : 1;
  const pad = 2;

  for (let i = n - 1; i >= 0; i--) {
    let px = cx(s[i].x), py = cy(s[i].y), size = C - pad * 2;

    if (i === 0 && n > 1) {
      // lerp the head out of the cell it just left
      px = cx(s[1].x) + (cx(s[0].x) - cx(s[1].x)) * p;
      py = cy(s[1].y) + (cy(s[0].y) - cy(s[1].y)) * p;
    } else if (i === n - 1 && n > 1 && world.grow === 0) {
      // the tail is vacating: shrink it as it goes
      const k = 1 - p * .8;
      size = (C - pad * 2) * k;
    }

    const head = i === 0;
    ctx.fillStyle = head ? '#5fc9a4' : '#3fae8f';
    ctx.globalAlpha = head ? 1 : Math.max(.45, 1 - i / (n * 1.6));
    const off = (C - size) / 2;
    ctx.fillRect(px + off, py + off, size, size);
    ctx.globalAlpha = 1;

    if (head) {
      // eyes, so the direction of travel is readable at a glance
      ctx.fillStyle = '#06201a';
      const d = world.dir;
      const ex = px + C / 2 + d.x * 4, ey = py + C / 2 + d.y * 4;
      const ox = d.x === 0 ? 4 : 0, oy = d.y === 0 ? 4 : 0;
      ctx.fillRect(ex - ox - 1.5, ey - oy - 1.5, 3, 3);
      ctx.fillRect(ex + ox - 1.5, ey + oy - 1.5, 3, 3);
    }
  }
}

function drawFood(f) {
  const t = performance.now() / 400;
  const r = C * .3 + Math.sin(t) * 1.2;
  ctx.fillStyle = '#c9a227';
  ctx.beginPath();
  ctx.arc(cx(f.x) + C / 2, cy(f.y) + C / 2, r, 0, Math.PI * 2);
  ctx.fill();
}

function drawBonus(b) {
  const t = performance.now() / 200;
  // fades as it runs out of time, so urgency is visible without a timer bar
  const life = b.ttl / E.BONUS_TTL;
  ctx.globalAlpha = .45 + .55 * Math.abs(Math.sin(t));
  ctx.fillStyle = life < .3 ? '#e0503c' : '#e6e9e2';
  const r = C * .34;
  const px = cx(b.x) + C / 2, py = cy(b.y) + C / 2;
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const a = -Math.PI / 2 + i * Math.PI * 2 / 5;
    const a2 = a + Math.PI / 5;
    ctx.lineTo(px + Math.cos(a) * r, py + Math.sin(a) * r);
    ctx.lineTo(px + Math.cos(a2) * r * .45, py + Math.sin(a2) * r * .45);
  }
  ctx.closePath();
  ctx.fill();
  ctx.globalAlpha = 1;
}

sync();                      // makeFit already performed the first fit
requestAnimationFrame(frame);
</script>
